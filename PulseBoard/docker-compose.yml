# PulseBoard - Docker Compose
# Generated by Meta App Factory

version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pulseboard_backend
    restart: unless-stopped
    ports:
      - "5008:5008"
    env_file:
      - .env
    volumes:
      - app_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5008/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pulseboard_frontend
    restart: unless-stopped
    ports:
      - "5108:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  app_data:
