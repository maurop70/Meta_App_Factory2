version: '3.8'

services:
  resonance:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resonance
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.50'
          memory: 1G
    # host networking: required for Chromecast/mDNS on native Linux. NOTE: on
    # Docker Desktop (Windows/macOS) the engine runs in a VM, so this does NOT
    # grant the container the physical LAN and mDNS discovery will usually fail —
    # use the configured-speaker IP fallback (google_home.known_speakers).
    network_mode: host
    # Secrets are passed THROUGH from the host environment by NAME only (the
    # idiomatic compose passthrough) — no values are ever written here. Under host
    # networking RESONANCE_TOKEN is the ONLY barrier to the LAN, so it must reach
    # the container or the server fails closed and refuses to boot.
    environment:
      - GEMINI_API_KEY
      - ANTHROPIC_API_KEY
      - RESONANCE_TOKEN
      - RESONANCE_CLAUDE_MODEL
      - PORT=${PORT:-5006}
    volumes:
      # Persistent volumes for clinical reports and homework uploads
      - ./uploads:/app/uploads
      - ../../.system_logs:/var/log/aether_net
      - ./Professional_Reports:/app/Professional_Reports
      # FIX: Mounted as a directory to prevent single-file IsADirectoryError crashes
      - ./config:/app/config
      # Global system logic traversal to the root workspace (Read-Only)
      - ../../.system_core:/app/.system_core:ro
    restart: unless-stopped
