# ── Delegate AI Beta-Agreement Vault — Docker Compose ──
# Orchestrates Backend (FastAPI), Frontend (React), and PostgreSQL
# Project: DAI-2026-A1F3E7

version: "3.9"

services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    container_name: vault_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vault_db
      POSTGRES_USER: vault_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vault_secure_2026}
    ports:
      - "5432:5432"
    volumes:
      - vault_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vault_admin -d vault_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI on port 5007) ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vault_backend
    restart: unless-stopped
    ports:
      - "5007:5007"
    environment:
      DATABASE_URL: postgresql://vault_admin:${DB_PASSWORD:-vault_secure_2026}@db:5432/vault_db
      VAULT_ENCRYPTION_KEY: ${VAULT_ENCRYPTION_KEY:-auto}
      PROJECT_ID: DAI-2026-A1F3E7
    volumes:
      - vault_data:/app/vault_data
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend (React/Vite on port 5008) ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: vault_frontend
    restart: unless-stopped
    ports:
      - "5008:80"
    depends_on:
      - backend

volumes:
  vault_pgdata:
  vault_data:
