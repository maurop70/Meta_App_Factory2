server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend
    location /health {
        proxy_pass http://backend:5007;
    }
    location /vault/ {
        proxy_pass http://backend:5007;
    }
    location /alerts {
        proxy_pass http://backend:5007;
    }
    location /audit {
        proxy_pass http://backend:5007;
    }
}
