version: '3.8'

services:
  venture_architect_agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: venture_architect_agent
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.50'
          memory: 1G
    ports:
      # Zero collision with CMO_Elite (5020) or Core API (5000)
      - "5110:5110"
    env_file:
      - ../../.env
    volumes:
      # Isolate code execution while linking necessary root modules (Read-Only)
      - ../../.system_core:/app/.system_core:ro
      - ../../.system_logs:/var/log/aether_net
      - ../../Global_Projects:/app/Global_Projects
    restart: unless-stopped
    networks:
      - aether_net

networks:
  aether_net:
    # Explicitly declared as external to bridge with the root Meta_App_Factory topology
    external: true
    name: aether_net
