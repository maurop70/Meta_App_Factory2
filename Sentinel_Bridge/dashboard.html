<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Sentinel Bridge — Dashboard</title>
    <meta name="description" content="Autonomous Reminder System by Meta App Factory">
    <meta name="theme-color" content="#0f0f1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sentinel">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-card: rgba(255,255,255,0.04);
            --bg-card-hover: rgba(255,255,255,0.07);
            --bg-glass: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.08);
            --border-focus: rgba(99,102,241,0.5);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #6366f1;
            --accent-glow: rgba(99,102,241,0.3);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --cat-ai: #7c3aed;
            --cat-work: #2563eb;
            --cat-school: #eab308;
            --cat-family: #10b981;
            --cat-uncategorized: #6b7280;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',-apple-system,sans-serif;
            background:var(--bg-primary); color:var(--text-primary);
            min-height:100vh; overflow-x:hidden;
        }
        body::before {
            content:''; position:fixed; top:-50%; left:-50%;
            width:200%; height:200%;
            background:radial-gradient(ellipse at 20% 50%,rgba(99,102,241,0.08) 0%,transparent 50%),
                        radial-gradient(ellipse at 80% 20%,rgba(139,92,246,0.06) 0%,transparent 50%),
                        radial-gradient(ellipse at 50% 80%,rgba(59,130,246,0.05) 0%,transparent 50%);
            z-index:-1; animation:ambientShift 20s ease-in-out infinite alternate;
        }
        @keyframes ambientShift { 0%{transform:translate(0,0) rotate(0deg);} 100%{transform:translate(-2%,2%) rotate(3deg);} }

        .header {
            padding:16px 24px; display:flex; align-items:center; justify-content:space-between;
            border-bottom:1px solid var(--border); backdrop-filter:blur(20px);
            position:sticky; top:0; z-index:100; background:rgba(15,15,26,0.8);
        }
        .header-left { display:flex; align-items:center; gap:10px; }
        .logo {
            width:34px; height:34px;
            background:linear-gradient(135deg,var(--accent),#8b5cf6);
            border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px;
        }
        .header-left h1 { font-size:18px; font-weight:600; letter-spacing:-0.3px; }
        .header-left h1 span { color:var(--text-muted); font-weight:400; }
        .header-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
        .status-pills { display:flex; gap:6px; flex-wrap:wrap; }
        .pill {
            display:flex; align-items:center; gap:5px;
            padding:5px 10px; border-radius:16px;
            font-size:11px; font-weight:500;
            background:var(--bg-glass); border:1px solid var(--border);
            cursor:pointer; transition:all 0.2s;
        }
        .pill:hover { background:rgba(255,255,255,0.1); }
        .pill .dot { width:6px; height:6px; border-radius:50%; animation:pulse 2s ease-in-out infinite; }
        .dot-green { background:var(--success); }
        .dot-yellow { background:var(--warning); }
        .dot-red { background:var(--danger); }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

        .ngrok-pill {
            max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
            font-family:monospace; font-size:10px;
        }

        /* Tabs */
        .tab-bar {
            display:flex; gap:0; border-bottom:1px solid var(--border);
            background:rgba(15,15,26,0.6); backdrop-filter:blur(10px);
            position:sticky; top:62px; z-index:99;
        }
        .tab {
            padding:12px 24px; font-size:13px; font-weight:500;
            color:var(--text-muted); cursor:pointer; position:relative;
            transition:all 0.2s; border:none; background:none; font-family:'Inter',sans-serif;
        }
        .tab:hover { color:var(--text-secondary); }
        .tab.active { color:var(--accent); }
        .tab.active::after {
            content:''; position:absolute; bottom:0; left:0; right:0;
            height:2px; background:linear-gradient(90deg,var(--accent),#8b5cf6);
            border-radius:2px 2px 0 0;
        }
        .tab-content { display:none; }
        .tab-content.active { display:block; }

        .main { max-width:1200px; margin:0 auto; padding:20px 24px; display:flex; flex-direction:column; gap:20px; }
        .card {
            background:var(--bg-card); border:1px solid var(--border);
            border-radius:14px; padding:20px; backdrop-filter:blur(16px);
            transition:all 0.3s;
        }
        .card:hover { background:var(--bg-card-hover); border-color:rgba(255,255,255,0.12); }
        .card-title {
            font-size:13px; font-weight:600; text-transform:uppercase;
            letter-spacing:0.5px; color:var(--text-secondary);
            margin-bottom:14px; display:flex; align-items:center; gap:8px;
        }

        .input-section { display:flex; gap:10px; align-items:stretch; }
        .input-wrapper { flex:1; }
        .input-wrapper input {
            width:100%; padding:13px 16px;
            background:rgba(255,255,255,0.05);
            border:1px solid var(--border); border-radius:10px;
            color:var(--text-primary); font-family:'Inter',sans-serif; font-size:14px;
            outline:none; transition:all 0.2s;
        }
        .input-wrapper input:focus { border-color:var(--border-focus); box-shadow:0 0 0 3px var(--accent-glow); }
        .input-wrapper input::placeholder { color:var(--text-muted); }

        .btn {
            display:flex; align-items:center; justify-content:center; gap:6px;
            padding:10px 16px; border:none; border-radius:10px;
            font-family:'Inter',sans-serif; font-size:13px; font-weight:500;
            cursor:pointer; transition:all 0.2s; white-space:nowrap;
        }
        .btn-primary { background:linear-gradient(135deg,var(--accent),#8b5cf6); color:white; }
        .btn-primary:hover { transform:translateY(-1px); box-shadow:0 4px 20px var(--accent-glow); }
        .btn-voice {
            background:rgba(255,255,255,0.06); border:1px solid var(--border);
            color:var(--text-primary); min-width:48px; font-size:18px; padding:10px;
        }
        .btn-voice:hover { background:rgba(239,68,68,0.15); border-color:rgba(239,68,68,0.3); }
        .btn-voice.recording { background:rgba(239,68,68,0.2); border-color:rgba(239,68,68,0.5); animation:recordPulse 1s ease-in-out infinite; }
        @keyframes recordPulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.3);} 50%{box-shadow:0 0 0 8px rgba(239,68,68,0);} }
        .btn-sm { padding:5px 10px; font-size:11px; border-radius:7px; }
        .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text-secondary); }
        .btn-ghost:hover { background:rgba(255,255,255,0.05); color:var(--text-primary); }
        .btn-done { background:rgba(16,185,129,0.12); border:1px solid rgba(16,185,129,0.2); color:var(--success); }
        .btn-done:hover { background:rgba(16,185,129,0.2); }
        .btn-danger { background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.2); color:var(--danger); }
        .btn-danger:hover { background:rgba(239,68,68,0.2); }

        .reminder-list { display:flex; flex-direction:column; gap:6px; }
        .reminder-item {
            display:flex; align-items:center; gap:12px;
            padding:12px 14px; background:rgba(255,255,255,0.02);
            border:1px solid var(--border); border-radius:10px;
            transition:all 0.2s; animation:slideIn 0.3s ease;
            position:relative; overflow:hidden; cursor:pointer;
            user-select:none; -webkit-user-select:none;
        }
        @keyframes slideIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
        .reminder-item:hover { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.12); }
        .reminder-item.done { opacity:0.45; }
        .reminder-item.done .reminder-activity { text-decoration:line-through; color:var(--text-muted); }
        .reminder-item.archived { display:none; }

        /* Filter Tabs */
        .filter-tab {
            padding:4px 12px; border-radius:20px; border:1px solid rgba(255,255,255,0.1);
            background:rgba(255,255,255,0.03); color:var(--text-muted);
            font-size:11px; font-weight:600; cursor:pointer; transition:all 0.2s;
        }
        .filter-tab:hover { background:rgba(255,255,255,0.08); color:var(--text-primary); }
        .filter-tab.active { background:rgba(124,58,237,0.2); color:#a78bfa; border-color:rgba(124,58,237,0.4); }

        /* Overdue */
        .reminder-item.overdue { border-left:3px solid var(--danger); }
        .overdue-badge {
            font-size:9px; font-weight:700; color:#ef4444; background:rgba(239,68,68,0.15);
            padding:1px 6px; border-radius:4px; text-transform:uppercase; letter-spacing:0.5px;
            animation:overduePulse 2s ease-in-out infinite;
        }
        @keyframes overduePulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }

        /* Smart Scheduling Slots */
        .smart-slot {
            padding:4px 10px; border-radius:6px; border:1px solid rgba(16,185,129,0.3);
            background:rgba(16,185,129,0.1); color:#34d399; font-size:11px; font-weight:500;
            cursor:pointer; transition:all 0.2s; white-space:nowrap;
        }
        .smart-slot:hover { background:rgba(16,185,129,0.25); transform:scale(1.03); border-color:rgba(16,185,129,0.5); }

        /* Swipe-to-archive */
        .reminder-item .swipe-bg {
            position:absolute; top:0; right:0; bottom:0; width:80px;
            background:linear-gradient(90deg,transparent,rgba(239,68,68,0.3));
            display:flex; align-items:center; justify-content:center;
            font-size:18px; opacity:0; transition:opacity 0.2s;
        }
        .reminder-item.swiping .swipe-bg { opacity:1; }
        .reminder-item .swipe-content {
            display:flex; align-items:center; gap:12px; width:100%;
            transition:transform 0.2s ease; position:relative; z-index:1;
        }

        .cat-badge {
            padding:3px 8px; border-radius:5px;
            font-size:10px; font-weight:600; text-transform:uppercase;
            letter-spacing:0.3px; white-space:nowrap; cursor:pointer;
            transition:all 0.2s; flex-shrink:0;
        }
        .cat-badge:hover { filter:brightness(1.2); transform:scale(1.05); }
        .cat-ai { background:rgba(124,58,237,0.2); color:#a78bfa; border:1px solid rgba(124,58,237,0.3); }
        .cat-work { background:rgba(37,99,235,0.2); color:#60a5fa; border:1px solid rgba(37,99,235,0.3); }
        .cat-school { background:rgba(234,179,8,0.2); color:#fbbf24; border:1px solid rgba(234,179,8,0.3); }
        .cat-family { background:rgba(16,185,129,0.2); color:#34d399; border:1px solid rgba(16,185,129,0.3); }
        .cat-uncategorized { background:rgba(107,114,128,0.2); color:#9ca3af; border:1px solid rgba(107,114,128,0.3); }

        .reminder-info { flex:1; min-width:0; overflow:hidden; }
        .reminder-activity { font-size:13px; font-weight:500; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .reminder-meta { font-size:11px; color:var(--text-muted); display:flex; gap:10px; flex-wrap:wrap; }
        .priority-dot { display:inline-block; width:5px; height:5px; border-radius:50%; margin-right:3px; }
        .priority-high { background:var(--danger); }
        .priority-normal { background:var(--success); }
        .priority-low { background:var(--text-muted); }
        .reminder-actions { display:flex; gap:4px; flex-shrink:0; }
        .cal-written { font-size:10px; color:var(--success); display:inline-flex; align-items:center; gap:3px; }

        .cat-dropdown {
            position:absolute; background:#1e1e2e; border:1px solid var(--border);
            border-radius:10px; padding:5px; z-index:200;
            box-shadow:0 12px 40px rgba(0,0,0,0.5); display:none; min-width:150px;
        }
        .cat-dropdown.show { display:block; }
        .cat-dropdown button {
            display:block; width:100%; text-align:left;
            padding:7px 10px; background:transparent; border:none;
            border-radius:5px; color:var(--text-primary);
            font-family:'Inter',sans-serif; font-size:12px; cursor:pointer;
        }
        .cat-dropdown button:hover { background:rgba(255,255,255,0.08); }

        .stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
        .stat-card {
            padding:12px; background:rgba(255,255,255,0.03);
            border:1px solid var(--border); border-radius:10px; text-align:center;
        }
        .stat-value {
            font-size:24px; font-weight:700;
            background:linear-gradient(135deg,var(--text-primary),var(--accent));
            -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
        }
        .stat-label { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }

        .account-row {
            display:flex; align-items:center; gap:8px;
            padding:8px 12px; background:rgba(255,255,255,0.02);
            border:1px solid var(--border); border-radius:8px; margin-bottom:6px; font-size:12px;
        }
        .account-row .email { flex:1; color:var(--text-secondary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .auth-badge { padding:2px 7px; border-radius:4px; font-size:10px; font-weight:600; }
        .auth-yes { background:rgba(16,185,129,0.15); color:var(--success); }
        .auth-no { background:rgba(239,68,68,0.15); color:var(--danger); }

        .two-col { display:grid; grid-template-columns:1fr 320px; gap:20px; }
        .cat-manager-list { display:flex; flex-direction:column; gap:6px; }
        .cat-manager-item {
            display:flex; align-items:center; gap:8px;
            padding:8px 12px; background:rgba(255,255,255,0.02);
            border:1px solid var(--border); border-radius:8px; font-size:12px;
        }
        .cat-manager-item .cat-name { flex:1; font-weight:500; }
        .cat-manager-item .cat-count { color:var(--text-muted); font-size:11px; }
        .cat-input-row { display:flex; gap:6px; margin-top:10px; }
        .cat-input-row input {
            flex:1; padding:8px 12px;
            background:rgba(255,255,255,0.05); border:1px solid var(--border);
            border-radius:8px; color:var(--text-primary);
            font-family:'Inter',sans-serif; font-size:12px; outline:none;
        }
        .cat-input-row input:focus { border-color:var(--border-focus); }

        /* Edit Modal */
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.6);
            backdrop-filter:blur(8px); z-index:500; display:none;
            align-items:center; justify-content:center;
            animation:fadeIn 0.2s ease;
        }
        .modal-overlay.show { display:flex; }
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
        .modal {
            background:#1a1a2e; border:1px solid var(--border);
            border-radius:16px; padding:28px; width:90%; max-width:480px;
            box-shadow:0 24px 80px rgba(0,0,0,0.5);
            animation:modalSlide 0.3s ease;
        }
        @keyframes modalSlide { from{transform:translateY(20px);opacity:0;} to{transform:translateY(0);opacity:1;} }
        .modal h2 { font-size:16px; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
        .modal label { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); margin-bottom:6px; margin-top:14px; }
        .modal input, .modal textarea, .modal select {
            width:100%; padding:10px 14px; background:rgba(255,255,255,0.05);
            border:1px solid var(--border); border-radius:8px;
            color:var(--text-primary); font-family:'Inter',sans-serif; font-size:13px; outline:none;
        }
        .modal input:focus, .modal textarea:focus, .modal select:focus { border-color:var(--border-focus); }
        .modal textarea { resize:vertical; min-height:60px; }
        .modal select { appearance:none; cursor:pointer; }
        .modal select option { background:#1a1a2e; }
        .modal-actions { display:flex; gap:10px; margin-top:20px; justify-content:flex-end; }

        /* Calendar View */
        .cal-header {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom:16px;
        }
        .cal-header h3 { font-size:16px; font-weight:600; }
        .cal-nav { display:flex; gap:8px; }
        .cal-nav button {
            background:var(--bg-glass); border:1px solid var(--border);
            color:var(--text-primary); padding:6px 14px; border-radius:8px;
            font-family:'Inter',sans-serif; font-size:12px; cursor:pointer;
            transition:all 0.2s;
        }
        .cal-nav button:hover { background:rgba(255,255,255,0.1); }
        .cal-grid {
            display:grid; grid-template-columns:repeat(7,1fr); gap:2px;
        }
        .cal-day-header {
            padding:8px 4px; text-align:center;
            font-size:11px; font-weight:600; color:var(--text-muted);
            text-transform:uppercase;
        }
        .cal-day {
            min-height:80px; padding:6px;
            background:rgba(255,255,255,0.02); border:1px solid var(--border);
            border-radius:6px; cursor:pointer; transition:all 0.2s;
            position:relative;
        }
        .cal-day:hover { background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.15); }
        .cal-day.other-month { opacity:0.3; }
        .cal-day.today { border-color:var(--accent); background:rgba(99,102,241,0.06); }
        .cal-day.selected { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-glow); }
        .cal-day-num { font-size:12px; font-weight:500; margin-bottom:4px; }
        .cal-event-dots { display:flex; flex-wrap:wrap; gap:2px; }
        .cal-dot {
            width:8px; height:8px; border-radius:50%;
            transition:transform 0.2s;
        }
        .cal-dot:hover { transform:scale(1.4); }
        .cal-event-chip {
            font-size:9px; padding:1px 4px; border-radius:3px;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
            max-width:100%; margin-top:1px; color:white; font-weight:500;
        }
        .cal-day-events {
            margin-top:16px; display:flex; flex-direction:column; gap:6px;
        }
        .cal-day-event-item {
            display:flex; align-items:center; gap:10px; padding:10px 14px;
            background:rgba(255,255,255,0.03); border:1px solid var(--border);
            border-radius:8px; font-size:12px;
        }
        .cal-day-event-item .color-bar { width:3px; height:28px; border-radius:2px; flex-shrink:0; }
        .cal-legend { display:flex; gap:12px; flex-wrap:wrap; margin-top:12px; }
        .cal-legend-item { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--text-secondary); }
        .cal-legend-dot { width:10px; height:10px; border-radius:50%; }

        .toast {
            position:fixed; bottom:20px; right:20px;
            padding:10px 16px; background:#1e293b;
            border:1px solid var(--border); border-radius:10px;
            font-size:12px; color:var(--text-primary); z-index:1000;
            transform:translateY(100px); opacity:0; transition:all 0.3s ease;
            display:flex; align-items:center; gap:6px; max-width:90vw;
        }
        .toast.show { transform:translateY(0); opacity:1; }

        .empty-state { text-align:center; padding:30px; color:var(--text-muted); }
        .empty-state .icon { font-size:32px; margin-bottom:10px; }

        .voice-indicator {
            display:none; align-items:center; gap:8px;
            padding:6px 12px; margin-top:8px;
            background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2);
            border-radius:8px; font-size:11px; color:#f87171;
        }
        .voice-indicator.active { display:flex; }
        .voice-wave { display:flex; gap:2px; align-items:center; }
        .voice-wave span { width:3px; border-radius:2px; background:#f87171; animation:wave 0.8s ease-in-out infinite; }
        .voice-wave span:nth-child(1) { height:8px; animation-delay:0s; }
        .voice-wave span:nth-child(2) { height:14px; animation-delay:0.15s; }
        .voice-wave span:nth-child(3) { height:10px; animation-delay:0.3s; }
        .voice-wave span:nth-child(4) { height:16px; animation-delay:0.45s; }
        @keyframes wave { 0%,100%{transform:scaleY(0.5);} 50%{transform:scaleY(1);} }

        .shimmer {
            background:linear-gradient(90deg,rgba(255,255,255,0.03) 25%,rgba(255,255,255,0.06) 50%,rgba(255,255,255,0.03) 75%);
            background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:8px; height:42px;
        }
        @keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }

        /* ── Bottom Navigation Bar ── */
        .bottom-nav {
            display:none; position:fixed; bottom:0; left:0; right:0;
            background:rgba(15,15,26,0.95); backdrop-filter:blur(20px);
            border-top:1px solid var(--border); z-index:200;
            padding:6px 0 calc(6px + env(safe-area-inset-bottom, 0px));
        }
        .bottom-nav-inner { display:flex; justify-content:space-around; align-items:center; }
        .bottom-nav-btn {
            display:flex; flex-direction:column; align-items:center; gap:2px;
            background:none; border:none; color:var(--text-muted);
            font-family:'Inter',sans-serif; font-size:10px; font-weight:500;
            padding:8px 16px; cursor:pointer; transition:all 0.2s;
            min-height:48px; min-width:64px; justify-content:center;
        }
        .bottom-nav-btn .nav-icon { font-size:22px; line-height:1; }
        .bottom-nav-btn.active { color:var(--accent); }
        .bottom-nav-btn.active .nav-icon { transform:scale(1.1); }

        /* ── Connectivity Banner ── */
        .connectivity-banner {
            display:none; position:fixed; top:0; left:0; right:0; z-index:300;
            padding:10px 16px; text-align:center; font-size:12px; font-weight:600;
            background:rgba(239,68,68,0.9); color:white;
            backdrop-filter:blur(10px); transition:all 0.3s;
        }
        .connectivity-banner.show { display:block; }

        /* ── Pull to Refresh Indicator ── */
        .ptr-indicator {
            display:none; position:fixed; top:60px; left:50%; transform:translateX(-50%);
            z-index:150; padding:8px 16px; border-radius:20px;
            background:rgba(99,102,241,0.15); border:1px solid rgba(99,102,241,0.3);
            color:var(--accent); font-size:11px; font-weight:500;
            backdrop-filter:blur(10px); transition:all 0.3s;
        }
        .ptr-indicator.active { display:flex; align-items:center; gap:6px; }
        .ptr-spinner { animation:spin 0.8s linear infinite; display:inline-block; }
        @keyframes spin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

        @media (max-width:768px) {
            /* Safe-area insets for notched devices */
            body {
                padding-top:env(safe-area-inset-top, 0px);
                padding-bottom:calc(68px + env(safe-area-inset-bottom, 0px));
            }
            .header {
                padding:10px 16px;
                padding-top:calc(10px + env(safe-area-inset-top, 0px));
            }
            .header-left h1 { font-size:15px; }
            .header-left h1 span { display:none; }

            /* Show status pills in scrollable row instead of hiding */
            .status-pills {
                display:flex !important; flex-wrap:nowrap;
                overflow-x:auto; -webkit-overflow-scrolling:touch;
                scrollbar-width:none; max-width:50vw;
            }
            .status-pills::-webkit-scrollbar { display:none; }
            .pill { flex-shrink:0; padding:4px 8px; font-size:10px; }

            /* Hide top tab bar, use bottom nav */
            .tab-bar { display:none !important; }
            .bottom-nav { display:block; }

            /* Layout */
            .main { padding:12px; gap:14px; padding-bottom:16px; }
            .two-col { grid-template-columns:1fr; }

            /* Bigger touch targets */
            .input-section { flex-direction:column; }
            .input-wrapper input { padding:16px; font-size:16px; border-radius:12px; }
            .input-section .btn-voice,
            .input-section .btn-primary {
                width:100%; justify-content:center;
                padding:16px; font-size:16px; min-height:52px;
                border-radius:12px;
            }

            /* Reminder items — finger-friendly */
            .reminder-item { padding:16px; min-height:64px; border-radius:12px; }
            .cat-badge { font-size:11px; padding:6px 12px; min-height:32px; display:flex; align-items:center; }
            .reminder-activity { font-size:14px; }
            .reminder-meta { font-size:12px; }
            .reminder-actions { flex-shrink:0; }
            .reminder-actions .btn-sm { min-width:40px; min-height:40px; font-size:16px; padding:8px; }

            /* Stats */
            .stats-grid { grid-template-columns:repeat(4,1fr); }
            .stat-card { padding:10px; }
            .stat-value { font-size:20px; }

            /* Cards */
            .card { padding:16px; border-radius:12px; }
            .card-title { font-size:12px; }

            /* Actions buttons — bigger */
            .card .btn-ghost { min-height:48px; font-size:14px; border-radius:10px; }

            /* Calendar grid — larger cells */
            .cal-day { min-height:52px; padding:4px; }
            .cal-event-chip { display:none; }
            .cal-day-num { font-size:11px; font-weight:600; }
            .cal-dot { width:6px; height:6px; }
            .cal-nav button { min-height:44px; padding:8px 16px; font-size:13px; }
            .cal-header h3 { font-size:15px; }

            /* Modal — full-screen on mobile */
            .modal-overlay.show { align-items:flex-end; }
            .modal {
                width:100%; max-width:100%; border-radius:20px 20px 0 0;
                padding:24px 20px calc(24px + env(safe-area-inset-bottom, 0px));
                max-height:90vh; overflow-y:auto;
                animation:modalSlideUp 0.3s ease;
            }
            @keyframes modalSlideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
            .modal h2 { font-size:18px; margin-bottom:16px; }
            .modal input, .modal textarea, .modal select {
                padding:14px 16px; font-size:16px; border-radius:10px;
            }
            .modal-actions { flex-direction:column; }
            .modal-actions .btn { width:100%; min-height:48px; font-size:15px; justify-content:center; }

            /* Toast — above bottom nav */
            .toast { bottom:calc(76px + env(safe-area-inset-bottom, 0px)); right:12px; left:12px; }

            /* Category dropdown */
            .cat-dropdown { max-width:calc(100vw - 32px); }
            .cat-dropdown button { padding:12px 14px; font-size:14px; min-height:44px; }
        }
        @media (max-width:480px) {
            .stats-grid { grid-template-columns:repeat(2,1fr); }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-left">
        <div class="logo">🛡️</div>
        <h1>Sentinel Bridge <span>Dashboard</span></h1>
    </div>
    <div class="header-right">
        <div class="pill ngrok-pill" id="ngrokPill" onclick="copyNgrokUrl()" title="Click to copy mobile link" style="display:none;">
            <div class="dot dot-green"></div>
            <span id="ngrokUrlText">—</span>
        </div>
        <div class="status-pills" id="statusPills">
            <div class="pill"><div class="dot dot-green"></div>Active</div>
            <div class="pill" id="calendarPill"><div class="dot dot-yellow"></div>Calendars</div>
            <div class="pill" id="ntfyPill"><div class="dot dot-green"></div>ntfy</div>
        </div>
    </div>
</header>

<nav class="tab-bar">
    <button class="tab active" data-tab="reminders" onclick="switchTab('reminders')">📋 Reminders</button>
    <button class="tab" data-tab="calendar" onclick="switchTab('calendar')">📅 Calendar</button>
</nav>

<!-- ═══ REMINDERS TAB ═══ -->
<div class="tab-content active" id="tab-reminders">
<main class="main">
    <div class="card">
        <div class="card-title">✨ Add Reminder</div>
        <div class="input-section">
            <div class="input-wrapper">
                <input type="text" id="reminderInput" placeholder='Type a reminder... e.g. "Pick up Leo at 4pm tomorrow"' autocomplete="off">
            </div>
            <button class="btn btn-voice" id="voiceBtn" title="Voice input">🎙</button>
            <button class="btn btn-primary" id="submitBtn" onclick="submitReminder()"><span>Add</span> →</button>
        </div>
        <div class="voice-indicator" id="voiceIndicator">
            <div class="voice-wave"><span></span><span></span><span></span><span></span></div>
            Listening... speak your reminder
        </div>
    </div>

    <div class="two-col">
        <div class="card">
            <div class="card-title" style="justify-content:space-between;">
                <span>📋 Reminders</span>
                <span style="font-size:11px;font-weight:400;color:var(--text-muted);" id="reminderCount">Loading...</span>
            </div>
            <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;">
                <button class="filter-tab active" data-filter="active" onclick="setFilter('active')">⚡ Active</button>
                <button class="filter-tab" data-filter="done" onclick="setFilter('done')">✅ Done</button>
                <button class="filter-tab" data-filter="all" onclick="setFilter('all')">📋 All</button>
                <input type="text" id="reminderSearch" placeholder="Search..." oninput="renderReminders()"
                    style="flex:1;min-width:100px;padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:var(--text-primary);font-size:12px;outline:none;">
            </div>
            <div class="reminder-list" id="reminderList">
                <div class="shimmer"></div><div class="shimmer" style="height:38px"></div>
            </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:20px;">
            <div class="card">
                <div class="card-title">📊 Stats</div>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value" id="statTotal">-</div><div class="stat-label">Total</div></div>
                    <div class="stat-card"><div class="stat-value" id="statPending">-</div><div class="stat-label">Pending</div></div>
                    <div class="stat-card"><div class="stat-value" id="statDone">-</div><div class="stat-label">Done</div></div>
                    <div class="stat-card"><div class="stat-value" id="statDelivered">-</div><div class="stat-label">Notified</div></div>
                </div>
            </div>
            <div class="card">
                <div class="card-title">🏷 Categories</div>
                <div class="cat-manager-list" id="catManagerList"><div class="shimmer" style="height:34px"></div></div>
                <div class="cat-input-row">
                    <input type="text" id="newCatInput" placeholder="New category name..." onkeydown="if(event.key==='Enter')addCategory()">
                    <button class="btn btn-sm btn-primary" onclick="addCategory()">+ Add</button>
                </div>
            </div>
            <div class="card">
                <div class="card-title">📆 Calendars</div>
                <div id="accountsList"><div class="shimmer" style="height:36px;margin-bottom:6px;"></div></div>
            </div>
            <div class="card">
                <div class="card-title">⚡ Actions</div>
                <div style="display:flex;flex-direction:column;gap:6px;">
                    <button class="btn btn-primary" onclick="showTaskForm()" style="width:100%;">➕ New Task</button>
                    <button class="btn btn-ghost" onclick="document.getElementById('docUploadInput').click()" style="width:100%;">📄 Upload & Parse Document</button>
                    <input type="file" id="docUploadInput" accept=".pdf,.docx,.txt,.csv,.md" style="display:none;" onchange="uploadAndParse(this)">
                    <button class="btn btn-ghost" onclick="forcePoll()" style="width:100%;">🔄 Force Calendar Poll</button>
                    <button class="btn btn-ghost" onclick="testNotification()" style="width:100%;">📲 Test Notification</button>
                    <button class="btn btn-ghost" onclick="reconnectTunnel()" style="width:100%;">🔗 Reconnect Tunnel</button>
                    <button class="btn btn-ghost" onclick="reauthorize()" style="width:100%;">🔑 Re-authorize Calendars</button>
                </div>
                <div id="parseResultBanner" style="display:none;margin-top:10px;padding:10px 14px;border-radius:8px;font-size:12px;"></div>
            </div>
        </div>
    </div>
</main>
</div>

<!-- ═══ CALENDAR TAB ═══ -->
<div class="tab-content" id="tab-calendar">
<main class="main">
    <div class="card">
        <div class="cal-header">
            <h3 id="calMonthTitle">March 2026</h3>
            <div class="cal-nav">
                <button onclick="calNavigate(-1)">← Prev</button>
                <button onclick="calGoToday()">Today</button>
                <button onclick="calNavigate(1)">Next →</button>
            </div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="cal-legend" id="calLegend"></div>
        <div class="cal-day-events" id="calDayEvents"></div>
    </div>
</main>
</div>

<!-- ═══ EDIT MODAL ═══ -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <h2>✏️ Edit Reminder</h2>
        <input type="hidden" id="editId">
        <label>Activity</label>
        <input type="text" id="editActivity">
        <label>Date & Time</label>
        <input type="datetime-local" id="editTime">
        <label>Category</label>
        <select id="editCategory"></select>
        <label>Description</label>
        <textarea id="editDescription" placeholder="Optional notes..."></textarea>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
            <button class="btn btn-danger" onclick="archiveFromModal()">Archive</button>
            <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>
<div class="cat-dropdown" id="catDropdown"></div>

<!-- ═══ CONNECTIVITY BANNER ═══ -->
<div class="connectivity-banner" id="connectivityBanner">⚠️ You're offline — changes won't sync</div>

<!-- ═══ PULL-TO-REFRESH INDICATOR ═══ -->
<div class="ptr-indicator" id="ptrIndicator"><span class="ptr-spinner">↻</span> Refreshing…</div>

<!-- ═══ BOTTOM NAV (mobile) ═══ -->
<nav class="bottom-nav" id="bottomNav">
    <div class="bottom-nav-inner">
        <button class="bottom-nav-btn active" data-tab="reminders" onclick="switchTabMobile('reminders')">
            <span class="nav-icon">📋</span>Reminders
        </button>
        <button class="bottom-nav-btn" data-tab="calendar" onclick="switchTabMobile('calendar')">
            <span class="nav-icon">📅</span>Calendar
        </button>
    </div>
</nav>

<script>
const API = '';
let CATEGORIES = ['AI','Work',"Leo's School",'Family'];
const CAT_CLASS = {'AI':'cat-ai','Work':'cat-work',"Leo's School":'cat-school','Family':'cat-family'};
const CAT_EMOJI = {'AI':'🤖','Work':'💼',"Leo's School":'📚','Family':'👨‍👩‍👦'};
const CALENDAR_DEST = {'AI':'Work cal','Work':'Work cal',"Leo's School":'Personal cal','Family':'Personal cal'};
const CAT_COLORS = {'AI':'#7c3aed','Work':'#2563eb',"Leo's School":'#eab308','Family':'#10b981'};
let reminders = [];
let calYear, calMonth, calEvents = [], selectedDay = null;

// ── Init ──────────────
document.addEventListener('DOMContentLoaded', () => {
    const now = new Date();
    calYear = now.getFullYear(); calMonth = now.getMonth();
    loadAll(); setInterval(loadAll, 30000);
    setupVoice(); setupKeyboard();
    loadTunnelStatus();
    setupPullToRefresh();
    setupConnectivity();
    registerServiceWorker();
});

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
    document.getElementById(`tab-${tab}`).classList.add('active');
    // Sync bottom nav
    document.querySelectorAll('.bottom-nav-btn').forEach(b => b.classList.remove('active'));
    const bnBtn = document.querySelector(`.bottom-nav-btn[data-tab="${tab}"]`);
    if (bnBtn) bnBtn.classList.add('active');
    if (tab === 'calendar') loadCalendarEvents();
}

function switchTabMobile(tab) { switchTab(tab); }

async function loadAll() {
    await Promise.all([loadReminders(), loadTelemetry(), loadAccounts(), loadCategories()]);
}

// ── Tunnel Status ─────
async function loadTunnelStatus() {
    try {
        const r = await fetch(`${API}/api/tunnel/status`);
        const data = await r.json();
        const pill = document.getElementById('ngrokPill');
        const txt = document.getElementById('ngrokUrlText');
        if (data.url) {
            pill.style.display = 'flex';
            txt.textContent = data.url.replace('https://','').replace('http://','');
            pill.querySelector('.dot').className = `dot ${data.alive ? 'dot-green' : 'dot-red'}`;
        }
    } catch(e) {}
}

function copyNgrokUrl() {
    const txt = document.getElementById('ngrokUrlText').textContent;
    navigator.clipboard.writeText('https://' + txt + '/dashboard');
    showToast('📋 Mobile link copied!');
}

async function reconnectTunnel() {
    showToast('🔗 Reconnecting tunnel...');
    try {
        const r = await fetch(`${API}/api/tunnel/reconnect`, { method:'POST' });
        const data = await r.json();
        if (data.status === 'reconnected') {
            showToast(`✅ New URL: ${data.url}`);
            loadTunnelStatus();
        } else { showToast('❌ Reconnect failed'); }
    } catch(e) { showToast('❌ Reconnect error'); }
}

// ── API ───────────────
async function loadReminders() {
    try {
        const r = await fetch(`${API}/api/reminders`);
        const data = await r.json();
        reminders = data.reminders || [];
        renderReminders();
    } catch(e) { console.error('Load reminders:', e); }
}

async function loadTelemetry() {
    try {
        const r = await fetch(`${API}/api/telemetry`);
        const data = await r.json();
        document.getElementById('statTotal').textContent = data.reminders.total;
        document.getElementById('statPending').textContent = data.reminders.pending;
        document.getElementById('statDone').textContent = data.reminders.done;
        document.getElementById('statDelivered').textContent = data.notifications.delivered || 0;
    } catch(e) {}
}

async function loadAccounts() {
    try {
        const r = await fetch(`${API}/api/auth/status`);
        const data = await r.json();
        const c = document.getElementById('accountsList'); c.innerHTML = '';
        for (const [id, acc] of Object.entries(data.accounts)) {
            c.innerHTML += `<div class="account-row"><span>${acc.authorized ? '🟢':'🔴'}</span><span class="email">${acc.email}</span><span class="auth-badge ${acc.authorized ? 'auth-yes':'auth-no'}">${acc.authorized ? 'OK':'Connect'}</span>${!acc.authorized ? `<a href="/api/auth/google?account=${id}" class="btn btn-sm btn-primary" style="text-decoration:none;">Auth</a>`:''}</div>`;
        }
        const allAuth = Object.values(data.accounts).every(a => a.authorized);
        document.getElementById('calendarPill').querySelector('.dot').className = `dot ${allAuth ? 'dot-green':'dot-yellow'}`;
    } catch(e) {}
}

async function loadCategories() {
    try {
        const r = await fetch(`${API}/api/categories`);
        const data = await r.json();
        const cats = data.categories || data.active_categories || [];
        if (cats.length) CATEGORIES = cats;
        renderCategories(data);
        populateEditCategorySelect();
    } catch(e) {}
}

// ── Filter State ──
let currentFilter = 'active';
function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.toggle('active', t.dataset.filter === f));
    renderReminders();
}

// ── Render Reminders ──
function renderReminders() {
    const list = document.getElementById('reminderList');
    const count = document.getElementById('reminderCount');
    const search = (document.getElementById('reminderSearch')?.value || '').toLowerCase();
    const activeCount = reminders.filter(r => r.status !== 'done' && r.status !== 'archived').length;
    const doneCount = reminders.filter(r => r.status === 'done').length;
    count.textContent = `${activeCount} active / ${doneCount} done / ${reminders.length} total`;

    if (reminders.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>No reminders yet.</p></div>';
        return;
    }

    // Filter
    let filtered = [...reminders];
    if (currentFilter === 'active') filtered = filtered.filter(r => r.status !== 'done' && r.status !== 'archived');
    else if (currentFilter === 'done') filtered = filtered.filter(r => r.status === 'done');
    // 'all' shows everything except archived
    else filtered = filtered.filter(r => r.status !== 'archived');

    // Search
    if (search) filtered = filtered.filter(r => (r.activity||'').toLowerCase().includes(search) || (r.category||'').toLowerCase().includes(search));

    // Sort: active first, then done
    filtered.sort((a,b) => {
        if (a.status === 'done' && b.status !== 'done') return 1;
        if (a.status !== 'done' && b.status === 'done') return -1;
        return 0;
    });

    if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="icon">${currentFilter==='done'?'✅':'📭'}</div><p>No ${currentFilter} reminders.</p></div>`;
        return;
    }

    const now = new Date();
    list.innerHTML = filtered.map(r => {
        const catClass = CAT_CLASS[r.category] || 'cat-uncategorized';
        const emoji = CAT_EMOJI[r.category] || '📌';
        const isDone = r.status === 'done';
        const prioClass = r.priority === 'high' || r.priority === 'critical' ? 'priority-high' : r.priority === 'low' ? 'priority-low' : 'priority-normal';
        const timeStr = formatTime(r.time);
        const src = r.source === 'calendar' ? '📆' : r.source === 'voice' ? '🎙️' : r.source === 'document_parser' ? '📄' : '✏️';
        const calWritten = r.google_event_id ? `<span class="cal-written">📅 synced</span>` : '';

        // Overdue detection
        let isOverdue = false;
        if (!isDone && r.time) {
            try { isOverdue = new Date(r.time) < now; } catch {}
        }

        return `
            <div class="reminder-item ${isDone?'done':''} ${isOverdue?'overdue':''}" data-id="${r.id}"
                 ontouchstart="swipeStart(event)" ontouchmove="swipeMove(event)" ontouchend="swipeEnd(event)">
                <div class="swipe-bg">🗑️</div>
                <div class="swipe-content" onclick="openEditModal('${r.id}')">
                    <span class="cat-badge ${catClass}" onclick="event.stopPropagation();showCatDropdown(event,'${r.id}')" title="Click to change category">
                        ${emoji} ${r.category || 'Uncategorized'}
                    </span>
                    <div class="reminder-info">
                        <div class="reminder-activity"><span class="priority-dot ${prioClass}"></span> ${r.activity}</div>
                        <div class="reminder-meta">
                            <span>${src} ${r.source || 'manual'}</span>
                            ${timeStr ? `<span>${isOverdue?'🔴':'⏰'} ${timeStr}</span>` : ''}
                            ${isOverdue && !isDone ? '<span class="overdue-badge">OVERDUE</span>' : ''}
                            ${calWritten}
                        </div>
                    </div>
                    <div class="reminder-actions" onclick="event.stopPropagation()">
                        ${!isDone ? `
                            <button class="btn btn-sm btn-ghost" onclick="snoozeReminder('${r.id}')">😴</button>
                            <button class="btn btn-sm btn-done" onclick="markDone('${r.id}')">✓</button>
                        ` : '<span style="font-size:11px;color:var(--success);">✓</span>'}
                    </div>
                </div>
            </div>`;
    }).join('');
}

function renderCategories(data) {
    const list = document.getElementById('catManagerList');
    const cats = data.categories || data.active_categories || CATEGORIES;
    list.innerHTML = cats.map(cat => {
        const emoji = CAT_EMOJI[cat] || '🏷'; const cls = CAT_CLASS[cat] || 'cat-uncategorized';
        const dest = CALENDAR_DEST[cat] || 'Personal cal';
        return `<div class="cat-manager-item"><span class="cat-badge ${cls}" style="cursor:default;">${emoji} ${cat}</span><span class="cat-name"></span><span class="cat-count">→ ${dest}</span></div>`;
    }).join('');
}

async function addCategory() {
    const input = document.getElementById('newCatInput');
    const name = input.value.trim(); if (!name) return;
    try {
        await fetch(`${API}/api/categories`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name}) });
        input.value = ''; showToast(`🏷 Category "${name}" added`); await loadCategories();
    } catch(e) { showToast('❌ Failed to add category'); }
}

function formatTime(isoStr) {
    if (!isoStr) return '';
    try { const dt = new Date(isoStr); if (isNaN(dt)) return isoStr; return dt.toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); } catch { return isoStr; }
}

// ── Submit ─────────────
async function submitReminder() {
    const input = document.getElementById('reminderInput');
    const text = input.value.trim(); if (!text) return;
    const btn = document.getElementById('submitBtn');
    btn.innerHTML = '⏳'; btn.disabled = true;
    try {
        const source = input.dataset.source || 'manual';
        const r = await fetch(`${API}/api/reminders`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text,source}) });
        const data = await r.json();
        input.value = ''; input.dataset.source = 'manual';
        const calMsg = data.calendar_written ? ` → ${data.calendar_account}` : '';
        showToast(`✅ [${data.reminder.category}] ${data.reminder.activity}${calMsg}`);
        await loadAll();
    } catch(e) { showToast('❌ Failed to create reminder'); }
    finally { btn.innerHTML = '<span>Add</span> →'; btn.disabled = false; input.focus(); }
}

function showCatDropdown(e, reminderId) {

    dd.style.top = (rect.bottom+4)+'px'; dd.style.left = Math.min(rect.left, window.innerWidth-170)+'px';

    const close = (ev) => { if(!dd.contains(ev.target)){dd.classList.remove('show');document.removeEventListener('click',close);} };

// ── Task Creation Modal ──
function showTaskForm() {
    document.getElementById('taskModal').style.display = 'flex';
    document.getElementById('taskDueDate').value = new Date(Date.now()+86400000).toISOString().slice(0,16);
    fetchSmartSuggestions();
}
function hideTaskForm() { document.getElementById('taskModal').style.display = 'none'; }
async function submitTask() {
    const payload = {
        activity: document.getElementById('taskTitle').value.trim(),
        category: document.getElementById('taskCategory').value,
        due_date: document.getElementById('taskDueDate').value || null,
        priority: document.getElementById('taskPriority').value,
        description: document.getElementById('taskNotes').value.trim(),
    };
    if (!payload.activity) { showToast('Please enter a task title'); return; }
    hideTaskForm();
    showToast('Creating task...');
    try {
        const r = await fetch(API + '/api/tasks', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        const data = await r.json();
        if (data.status === 'created') {
            showToast('\u2705 Task created' + (data.calendar_synced ? ' + synced to Calendar' : ''));
            await loadAll();
        } else {
            showToast('\u274c ' + (data.detail || 'Failed'));
        }
    } catch(e) { showToast('\u274c Error: ' + e.message); }
    document.getElementById('taskTitle').value = '';
    document.getElementById('taskNotes').value = '';
}

// ── Smart Scheduling ──
async function fetchSmartSuggestions() {
    const container = document.getElementById('smartSuggestions');
    if (!container) return;
    container.innerHTML = '<span style="font-size:11px;color:var(--text-muted);">\u23f3 Finding free slots...</span>';
    try {
        const r = await fetch(`${API}/api/calendar/freebusy?days=7`);
        const data = await r.json();
        if (!data.suggestions || data.suggestions.length === 0) {
            container.innerHTML = '<span style="font-size:11px;color:var(--text-muted);">No free slots found</span>';
            return;
        }
        // Group by day, show up to 6 suggestions
        const slots = data.suggestions.slice(0, 6);
        container.innerHTML = '<div style="font-size:10px;font-weight:600;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">\ud83e\udde0 Smart Schedule \u2014 Free Slots</div>' +
            '<div style="display:flex;flex-wrap:wrap;gap:6px;">' +
            slots.map(s => `<button class="smart-slot" onclick="pickSlot('${s.start}')" title="Click to use this time">${s.label}</button>`).join('') +
            '</div>' +
            `<div style="font-size:10px;color:var(--text-muted);margin-top:4px;">${data.busy_blocks} busy blocks across ${data.accounts_queried.length} calendar(s)</div>`;
    } catch(e) {
        container.innerHTML = '<span style="font-size:11px;color:var(--text-muted);">Could not load suggestions</span>';
    }
}

function pickSlot(isoStr) {
    // Convert to datetime-local format
    const dt = new Date(isoStr);
    const local = new Date(dt.getTime() - dt.getTimezoneOffset() * 60000);
    document.getElementById('taskDueDate').value = local.toISOString().slice(0, 16);
    showToast('\u2705 Time slot selected');
}

// ── Document Upload & Parse ──
async function uploadAndParse(input) {
    const file = input.files?.[0]; if (!file) return;
    input.value = '';
    showToast('📄 Parsing ' + file.name + '...');
    const banner = document.getElementById('parseResultBanner');
    banner.style.display = 'block';
    banner.style.background = 'rgba(99,102,241,0.08)';
    banner.style.border = '1px solid rgba(99,102,241,0.2)';
    banner.textContent = '⏳ Parsing ' + file.name + '...';
    try {
        const fd = new FormData();
        fd.append('file', file);
        const r = await fetch(API + '/api/documents/upload', { method:'POST', body:fd });
        const data = await r.json();
        if (data.error) {
            banner.style.background = 'rgba(239,68,68,0.08)';
            banner.style.border = '1px solid rgba(239,68,68,0.2)';
            banner.textContent = '❌ ' + data.error;
            showToast('❌ Parse failed');
        } else {
            const cat = data.category || 'Unknown';
            const conf = ((data.confidence || 0) * 100).toFixed(0);
            const count = data.activities_extracted || 0;
            const reminders = data.reminders_created || [];
            banner.style.background = 'rgba(34,197,94,0.08)';
            banner.style.border = '1px solid rgba(34,197,94,0.2)';
            if (count > 0) {
                const preview = reminders.slice(0, 3).map(r => r.activity).join(' • ');
                const more = count > 3 ? ` + ${count - 3} more` : '';
                banner.innerHTML = `✅ <strong>${count} activities</strong> extracted (${cat} ${conf}%)<br><span style="font-size:11px;color:var(--text-secondary);">${preview}${more}</span>`;
                showToast(`✅ ${count} activities → ${count} reminders created`);
            } else {
                banner.innerHTML = `✅ <strong>${cat}</strong> (${conf}%) — no activities found`;
                showToast(`✅ ${cat} (${conf}%) — parsed, no activities`);
            }
            await loadAll();
        }
        setTimeout(() => { banner.style.display = 'none'; }, 10000);
    } catch(e) {
        banner.style.background = 'rgba(239,68,68,0.08)';
        banner.style.border = '1px solid rgba(239,68,68,0.2)';
        banner.textContent = '❌ ' + e.message;
        showToast('❌ Upload error');
        setTimeout(() => { banner.style.display = 'none'; }, 5000);
    }
}

// ── Swipe to Archive (Mobile) ──
let swipeStartX = 0, swipeEl = null, swipeThreshold = 80;

function swipeStart(e) {
    if (e.touches.length !== 1) return;
    swipeStartX = e.touches[0].clientX;
    swipeEl = e.currentTarget;
}

function swipeMove(e) {
    if (!swipeEl) return;
    const dx = swipeStartX - e.touches[0].clientX;
    if (dx > 10) {
        e.preventDefault();
        const content = swipeEl.querySelector('.swipe-content');
        const clamped = Math.min(dx, 120);
        content.style.transform = `translateX(-${clamped}px)`;
        swipeEl.classList.toggle('swiping', dx > 40);
    }
}

function swipeEnd(e) {
    if (!swipeEl) return;
    const content = swipeEl.querySelector('.swipe-content');
    const dx = swipeStartX - (e.changedTouches[0]?.clientX || swipeStartX);
    if (dx > swipeThreshold) {
        const id = swipeEl.dataset.id;
        content.style.transform = `translateX(-100%)`;
        swipeEl.style.opacity = '0';
        swipeEl.style.maxHeight = '0';
        swipeEl.style.padding = '0';
        swipeEl.style.margin = '0';
        setTimeout(async () => {
            await fetch(`${API}/api/reminders/${id}/archive`, { method:'PUT' });
            showToast('🗑️ Archived'); await loadAll();
        }, 300);
    } else {
        content.style.transform = '';
        swipeEl.classList.remove('swiping');
    }
    swipeEl = null;
}

// ── Calendar View ──────
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

async function loadCalendarEvents() {
    try {
        const r = await fetch(`${API}/api/calendar/events?month=${calMonth+1}&year=${calYear}`);
        const data = await r.json();
        calEvents = data.events || [];
        renderCalendar();
        renderCalLegend(data.category_colors || CAT_COLORS);
    } catch(e) { console.error('Load calendar:', e); }
}

function calNavigate(delta) { calMonth += delta; if (calMonth > 11) { calMonth = 0; calYear++; } if (calMonth < 0) { calMonth = 11; calYear--; } selectedDay = null; loadCalendarEvents(); }
function calGoToday() { const now = new Date(); calYear = now.getFullYear(); calMonth = now.getMonth(); selectedDay = null; loadCalendarEvents(); }

function renderCalendar() {
    document.getElementById('calMonthTitle').textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;
    const grid = document.getElementById('calGrid');
    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
    const today = new Date();
    const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

    let html = DAY_NAMES.map(d => `<div class="cal-day-header">${d}</div>`).join('');

    // Previous month fill
    const prevDays = new Date(calYear, calMonth, 0).getDate();
    for (let i = firstDay - 1; i >= 0; i--) {
        html += `<div class="cal-day other-month"><div class="cal-day-num">${prevDays - i}</div></div>`;
    }

    // Current month
    for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dayEvents = calEvents.filter(e => e.date === dateStr);
        const isToday = dateStr === todayStr;
        const isSelected = selectedDay === dateStr;

        let dots = '';
        if (dayEvents.length <= 4) {
            dots = dayEvents.map(e => `<div class="cal-dot" style="background:${e.color}" title="${e.title}"></div>`).join('');
        } else {
            dots = dayEvents.slice(0,3).map(e => `<div class="cal-dot" style="background:${e.color}"></div>`).join('');
            dots += `<span style="font-size:9px;color:var(--text-muted);">+${dayEvents.length-3}</span>`;
        }
        const chip = dayEvents.length > 0 && dayEvents.length <= 2 ? dayEvents.map(e => `<div class="cal-event-chip" style="background:${e.color};">${e.title}</div>`).join('') : '';

        html += `<div class="cal-day${isToday?' today':''}${isSelected?' selected':''}" onclick="selectDay('${dateStr}')">
            <div class="cal-day-num">${d}</div>
            <div class="cal-event-dots">${dots}</div>${chip}</div>`;
    }

    // Next month fill
    const totalCells = firstDay + daysInMonth;
    const remaining = (7 - (totalCells % 7)) % 7;
    for (let i = 1; i <= remaining; i++) {
        html += `<div class="cal-day other-month"><div class="cal-day-num">${i}</div></div>`;
    }

    grid.innerHTML = html;
}

function selectDay(dateStr) {
    selectedDay = dateStr;
    // Re-render to highlight
    renderCalendar();
    // Show day events
    const dayEvts = calEvents.filter(e => e.date === dateStr);
    const container = document.getElementById('calDayEvents');
    if (dayEvts.length === 0) {
        container.innerHTML = `<div class="empty-state" style="padding:16px;"><p style="font-size:12px;">No events on ${new Date(dateStr+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</p></div>`;
        return;
    }
    container.innerHTML = `<div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;">${new Date(dateStr+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>` +
        dayEvts.map(e => `<div class="cal-day-event-item" onclick="openEditModal('${e.id}')">
            <div class="color-bar" style="background:${e.color};"></div>
            <div style="flex:1;"><div style="font-weight:500;">${e.title}</div><div style="font-size:10px;color:var(--text-muted);">${e.time} · ${e.category} · ${e.source}</div></div>
            <span class="cat-badge ${CAT_CLASS[e.category]||'cat-uncategorized'}" style="cursor:default;">${e.category}</span>
        </div>`).join('');
}

function renderCalLegend(colors) {
    document.getElementById('calLegend').innerHTML = Object.entries(colors).map(([cat,color]) =>
        `<div class="cal-legend-item"><div class="cal-legend-dot" style="background:${color};"></div>${cat}</div>`
    ).join('');
}

// ── Voice ──────────────
function setupVoice() {
    const btn = document.getElementById('voiceBtn');
    const indicator = document.getElementById('voiceIndicator');
    const input = document.getElementById('reminderInput');
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { btn.style.opacity='0.3'; btn.title='Not supported'; return; }
    const recognition = new SR();
    recognition.continuous = false; recognition.interimResults = true; recognition.lang = 'en-US';
    let listening = false;
    btn.onclick = () => { if(listening){recognition.stop();}else{recognition.start();} };
    recognition.onstart = () => { listening=true; btn.classList.add('recording'); indicator.classList.add('active'); };
    recognition.onresult = (e) => { let t=''; for(let i=e.resultIndex;i<e.results.length;i++) t+=e.results[i][0].transcript; input.value=t; input.dataset.source='voice'; };
    recognition.onend = () => { listening=false; btn.classList.remove('recording'); indicator.classList.remove('active'); if(input.value.trim()) submitReminder(); };
    recognition.onerror = (e) => { listening=false; btn.classList.remove('recording'); indicator.classList.remove('active'); if(e.error!=='no-speech') showToast('🎙 '+e.error); };
}

function setupKeyboard() { document.getElementById('reminderInput').addEventListener('keydown',(e)=>{if(e.key==='Enter')submitReminder();}); }

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Pull-to-Refresh (mobile gesture) ──
function setupPullToRefresh() {
    let startY = 0, pulling = false;
    const indicator = document.getElementById('ptrIndicator');
    const threshold = 80;

    document.addEventListener('touchstart', (e) => {
        if (window.scrollY === 0 && e.touches.length === 1) {
            startY = e.touches[0].clientY;
            pulling = true;
        }
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
        if (!pulling) return;
        const dy = e.touches[0].clientY - startY;
        if (dy > 30 && window.scrollY === 0) {
            indicator.classList.add('active');
        }
    }, { passive: true });

    document.addEventListener('touchend', async () => {
        if (!pulling) return;
        pulling = false;
        if (indicator.classList.contains('active')) {
            await loadAll();
            showToast('✅ Refreshed');
            setTimeout(() => indicator.classList.remove('active'), 600);
        }
    });
}

// ── Online / Offline Connectivity Banner ──
function setupConnectivity() {
    const banner = document.getElementById('connectivityBanner');
    window.addEventListener('offline', () => banner.classList.add('show'));
    window.addEventListener('online', () => {
        banner.classList.remove('show');
        showToast('🟢 Back online');
        loadAll();
    });
}

// ── Service Worker Registration ──
function registerServiceWorker() {
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
}
