[pytest]
# Limit test collection to directories that run locally without a live production
# server or browser. ERP/ and __tests__/ contain Playwright/smoke tests that
# target remote hosts (68.183.30.128) and cause stdout closure crashes in
# Python 3.14 + pytest 9.0.x (ValueError: I/O operation on closed file in
# terminalwriter.py). Those are addressed separately.
testpaths =
    Tests
    Adv_Autonomous_Agent
    HR_Bridge
    Sentinel_Bridge/tests
    scratch
    test_coo_agent.py
# --capture=no avoids the Python 3.14 / pytest 9.0.3 cleanup crash that
# occurs when a subprocess closes stdout before pytest finishes writing.
addopts = --capture=no
# pytest-asyncio 1.4.0 is installed; auto mode avoids needing @pytest.mark.asyncio
# on every async def test_* function.
asyncio_mode = auto
