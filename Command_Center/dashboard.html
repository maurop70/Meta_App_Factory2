<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether Command Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-card: #16213e;
      --bg-input: #0a0a15;
      --text-normal: #e0e0f0;
      --text-muted: #8888aa;
      --text-header: #f0f0ff;
      --accent: #6c63ff;
      --accent-hover: #5a52e0;
      --green: #4CAF50;
      --yellow: #FF9800;
      --red: #F44336;
      --border: rgba(108, 99, 255, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-normal);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-left h1 { font-size: 1.3rem; font-weight: 700; color: var(--text-header); }
    .header-badge {
      font-size: 0.7rem; padding: 3px 10px; border-radius: 12px;
      background: rgba(76,175,80,0.15); color: var(--green);
      border: 1px solid rgba(76,175,80,0.3); font-weight: 600;
    }
    .header-right { font-size: 0.8rem; color: var(--text-muted); }

    /* Main Grid */
    .container { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      border-color: rgba(108,99,255,0.35);
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 1px solid rgba(108,99,255,0.1);
    }
    .card-title { display: flex; align-items: center; gap: 8px; font-weight: 600; color: var(--text-header); }
    .card-title .icon { font-size: 1.2rem; }
    .badge {
      font-size: 0.7rem; padding: 3px 8px; border-radius: 10px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-green { background: rgba(76,175,80,0.15); color: var(--green); border: 1px solid rgba(76,175,80,0.3); }
    .badge-yellow { background: rgba(255,152,0,0.15); color: var(--yellow); border: 1px solid rgba(255,152,0,0.3); }
    .badge-red { background: rgba(244,67,54,0.15); color: var(--red); border: 1px solid rgba(244,67,54,0.3); }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th {
      text-align: left; padding: 8px 10px; color: var(--text-muted);
      font-weight: 500; font-size: 0.73rem; text-transform: uppercase;
      letter-spacing: 0.5px; border-bottom: 1px solid rgba(108,99,255,0.1);
    }
    td { padding: 10px; border-bottom: 1px solid rgba(15,15,26,0.5); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(108,99,255,0.04); }

    /* Status */
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .dot-green { background: var(--green); box-shadow: 0 0 6px rgba(76,175,80,0.5); animation: pulse 2s infinite; }
    .dot-gray { background: #555; }
    .dot-yellow { background: var(--yellow); }
    .dot-red { background: var(--red); box-shadow: 0 0 6px rgba(244,67,54,0.5); }

    .status-badge {
      display: inline-flex; padding: 2px 8px; border-radius: 10px;
      font-size: 0.75rem; font-weight: 500;
    }
    .status-active { background: rgba(76,175,80,0.12); color: var(--green); }
    .status-inactive { background: rgba(85,85,85,0.2); color: #777; }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* Health Grid */
    .health-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .health-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--bg-primary);
      border-radius: 8px; transition: background 0.2s;
    }
    .health-item:hover { background: rgba(15,15,26,0.8); }
    .health-name { font-size: 0.85rem; font-weight: 500; }
    .health-ep { font-size: 0.7rem; color: var(--text-muted); font-family: 'Fira Code', monospace; }

    .section-label {
      font-size: 0.73rem; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.5px; margin: 14px 0 8px; font-weight: 600;
    }

    .sec-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 0.82rem; }
    .sec-note { margin-left: auto; color: var(--text-muted); font-size: 0.75rem; }

    /* Fiscal */
    .fiscal-row {
      display: flex; align-items: center; gap: 20px; margin-bottom: 16px;
    }
    .gauge-wrap { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
    .gauge-wrap svg { transform: rotate(-90deg); }
    .gauge-bg { fill: none; stroke: var(--bg-primary); stroke-width: 8; }
    .gauge-fill { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.8s ease; }
    .gauge-label {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      text-align: center;
    }
    .gauge-pct { font-size: 1.2rem; font-weight: 700; color: var(--text-header); display: block; }
    .gauge-sub { font-size: 0.65rem; color: var(--text-muted); }

    .fiscal-stats { flex: 1; }
    .f-stat { display: flex; justify-content: space-between; padding: 3px 0; font-size: 0.85rem; }
    .f-stat .label { color: var(--text-muted); }
    .f-stat .val { font-weight: 600; font-family: 'Fira Code', monospace; color: var(--text-header); }

    .svc-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 10px; background: var(--bg-primary); border-radius: 6px;
      margin-bottom: 4px; font-size: 0.82rem;
    }
    .svc-cost { font-family: 'Fira Code', monospace; font-weight: 500; }
    .cost-ok { color: var(--green); }
    .cost-warn { color: var(--yellow); }
    .cost-crit { color: var(--red); }

    /* Terminal */
    .terminal {
      background: var(--bg-primary); border-radius: 8px;
      padding: 14px; font-family: 'Fira Code', monospace;
    }
    .terminal-bar {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 10px; padding-bottom: 8px;
      border-bottom: 1px solid rgba(108,99,255,0.1);
    }
    .t-dot { width: 10px; height: 10px; border-radius: 50%; }
    .t-red { background: var(--red); }
    .t-yel { background: var(--yellow); }
    .t-grn { background: var(--green); }
    .t-title { font-size: 0.75rem; color: var(--text-muted); margin-left: 6px; }

    .t-input-row { display: flex; align-items: center; gap: 8px; }
    .t-prompt { color: var(--accent); font-weight: 600; font-size: 0.85rem; user-select: none; }
    .t-input {
      flex: 1; background: none; border: none; color: var(--text-normal);
      font-family: inherit; font-size: 0.85rem; outline: none;
      caret-color: var(--accent);
    }
    .t-input::placeholder { color: rgba(136,136,170,0.4); }
    .t-send {
      background: var(--accent); border: none; color: white;
      padding: 6px 14px; border-radius: 6px; font-size: 0.8rem;
      cursor: pointer; transition: background 0.2s; font-family: inherit;
    }
    .t-send:hover:not(:disabled) { background: var(--accent-hover); }
    .t-send:disabled { opacity: 0.5; cursor: not-allowed; }

    .t-output {
      margin-top: 12px; padding: 10px; background: rgba(0,0,0,0.3);
      border-radius: 6px; font-size: 0.82rem; white-space: pre-wrap;
      word-break: break-word; max-height: 200px; overflow-y: auto;
      animation: fadeIn 0.3s;
    }
    .t-output.err { color: var(--red); }
    .t-output.loading { color: var(--text-muted); }

    .full-width { grid-column: 1 / -1; }
    .loading-msg { text-align: center; padding: 40px; color: var(--text-muted); }
    .empty-msg { text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.85rem; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span style="font-size:1.5rem">🛰️</span>
      <h1>Aether Command Center</h1>
      <span class="header-badge">ADMIN</span>
    </div>
    <div class="header-right" id="lastRefresh">Loading...</div>
  </div>

  <div class="container">
    <div class="grid" id="dashboard">
      <div class="loading-msg full-width">Loading dashboard data...</div>
    </div>
  </div>

  <script>
    const API = '';
    let refreshTimer;

    async function fetchData() {
      try {
        const [projRes, healthRes, fiscalRes] = await Promise.all([
          fetch(`${API}/api/projects`), fetch(`${API}/api/health`), fetch(`${API}/api/fiscal`),
        ]);
        const projects = projRes.ok ? await projRes.json() : { projects: [] };
        const health = healthRes.ok ? await healthRes.json() : {};
        const fiscal = fiscalRes.ok ? await fiscalRes.json() : {};
        render(projects, health, fiscal);
        document.getElementById('lastRefresh').textContent =
          `Last refresh: ${new Date().toLocaleTimeString()} · Auto-refresh: 30s`;
      } catch (e) {
        document.getElementById('dashboard').innerHTML =
          `<div class="loading-msg full-width">Error loading data: ${e.message}</div>`;
      }
    }

    function dotClass(s) {
      if (['active','online'].includes(s)) return 'dot-green';
      if (['configured'].includes(s)) return 'dot-yellow';
      if (['error'].includes(s)) return 'dot-red';
      return 'dot-gray';
    }

    function statusClass(s) {
      if (['active','online','STABLE'].includes(s)) return 'status-active';
      return 'status-inactive';
    }

    function render(projData, health, fiscal) {
      const p = projData.projects || [];
      const budgetPct = fiscal.threshold ? Math.min(200, fiscal.current_total_cost / fiscal.threshold * 100) : 0;
      const circ = 2 * Math.PI * 42;
      const offset = circ - (Math.min(budgetPct, 100) / 100) * circ;
      const gColor = budgetPct >= 90 ? 'var(--red)' : budgetPct >= 75 ? 'var(--yellow)' : 'var(--green)';
      const gClass = budgetPct >= 90 ? 'badge-red' : budgetPct >= 75 ? 'badge-yellow' : 'badge-green';

      document.getElementById('dashboard').innerHTML = `
        <!-- Project Index -->
        <div class="card">
          <div class="card-header">
            <div class="card-title"><span class="icon">📋</span> Project Index</div>
            <span class="badge badge-green">${p.length} Apps</span>
          </div>
          ${p.length > 0 ? `
          <table>
            <thead><tr><th>Project</th><th>Status</th><th>Port</th><th>Type</th></tr></thead>
            <tbody>${p.map(pr => `
              <tr>
                <td style="font-weight:500">${pr.name}</td>
                <td><span class="status-badge ${statusClass(pr.status)}">${pr.status}</span></td>
                <td style="font-family:'Fira Code',monospace;font-size:0.8rem">${pr.port || '—'}</td>
                <td style="color:var(--text-muted)">${pr.type}</td>
              </tr>`).join('')}
            </tbody>
          </table>` : '<div class="empty-msg">No projects registered</div>'}
        </div>

        <!-- System Health -->
        <div class="card">
          <div class="card-header">
            <div class="card-title"><span class="icon">🏥</span> System Health</div>
            <span class="badge badge-green">LIVE</span>
          </div>
          <div class="section-label">Registered Services</div>
          <div class="health-grid">
            ${(health.services || []).map(s => `
              <div class="health-item">
                <span class="dot ${dotClass(s.status)}"></span>
                <div><div class="health-name">${s.name}</div><div class="health-ep">${s.endpoint}</div></div>
              </div>`).join('')}
            ${(health.infrastructure || []).map(s => `
              <div class="health-item">
                <span class="dot ${dotClass(s.status)}"></span>
                <div><div class="health-name">${s.name}</div><div class="health-ep">${s.endpoint}</div></div>
              </div>`).join('')}
          </div>
          <div class="section-label">Security Status</div>
          ${(health.security || []).map(s => `
            <div class="sec-row">
              <span>${s.status === 'green' ? '✅' : '🟡'}</span>
              <span>${s.item}</span>
              <span class="sec-note">${s.note}</span>
            </div>`).join('')}
        </div>

        <!-- Fiscal Oversight -->
        <div class="card">
          <div class="card-header">
            <div class="card-title"><span class="icon">💰</span> Fiscal Oversight</div>
            <span class="badge ${gClass}">$${(fiscal.current_total_cost || 0).toFixed(2)} / $${(fiscal.threshold || 10).toFixed(2)}</span>
          </div>
          <div class="fiscal-row">
            <div class="gauge-wrap">
              <svg width="100" height="100" viewBox="0 0 100 100">
                <circle class="gauge-bg" cx="50" cy="50" r="42"/>
                <circle class="gauge-fill" cx="50" cy="50" r="42"
                  stroke="${gColor}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
              </svg>
              <div class="gauge-label">
                <span class="gauge-pct">${Math.round(budgetPct)}%</span>
                <span class="gauge-sub">of budget</span>
              </div>
            </div>
            <div class="fiscal-stats">
              <div class="f-stat"><span class="label">Threshold</span><span class="val">$${(fiscal.threshold || 10).toFixed(2)}</span></div>
              <div class="f-stat"><span class="label">Spent</span><span class="val">$${(fiscal.current_total_cost || 0).toFixed(2)}</span></div>
              <div class="f-stat"><span class="label">Remaining</span><span class="val">$${(fiscal.budget_remaining || 0).toFixed(2)}</span></div>
              <div class="f-stat"><span class="label">Alerts</span><span class="val">${fiscal.alerts_sent || 0}</span></div>
            </div>
          </div>
          ${Object.entries(fiscal.service_costs || {}).map(([n, c]) => `
            <div class="svc-row">
              <span>${n}</span>
              <span class="svc-cost ${c > (fiscal.threshold || 10) ? 'cost-crit' : 'cost-ok'}">$${c.toFixed(2)}</span>
            </div>`).join('')}
        </div>

        <!-- Universal Input -->
        <div class="card">
          <div class="card-header">
            <div class="card-title"><span class="icon">⚡</span> Universal Input</div>
            <span class="badge badge-green">n8n Brain</span>
          </div>
          <div class="terminal">
            <div class="terminal-bar">
              <span class="t-dot t-red"></span><span class="t-dot t-yel"></span><span class="t-dot t-grn"></span>
              <span class="t-title">aether@brain ~ %</span>
            </div>
            <div class="t-input-row">
              <span class="t-prompt">❯</span>
              <input class="t-input" id="cmdInput" placeholder="Send a command to the Brain..." onkeydown="if(event.key==='Enter')sendCmd()">
              <button class="t-send" id="cmdBtn" onclick="sendCmd()">Send</button>
            </div>
            <div id="cmdOutput"></div>
          </div>
        </div>
      `;
    }

    async function sendCmd() {
      const input = document.getElementById('cmdInput');
      const output = document.getElementById('cmdOutput');
      const btn = document.getElementById('cmdBtn');
      if (!input.value.trim()) return;

      btn.disabled = true;
      btn.textContent = '...';
      output.innerHTML = '<div class="t-output loading">Processing command...</div>';

      try {
        const res = await fetch(`${API}/api/command`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: input.value }),
        });
        const data = await res.json();
        const isErr = !res.ok || data.status !== 'ok';
        output.innerHTML = `<div class="t-output ${isErr ? 'err' : ''}">${data.response || data.detail || 'Unknown error'}</div>`;
      } catch (e) {
        output.innerHTML = `<div class="t-output err">Connection error: ${e.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send';
      }
    }

    // Init
    fetchData();
    refreshTimer = setInterval(fetchData, 30000);
  </script>
</body>
</html>
