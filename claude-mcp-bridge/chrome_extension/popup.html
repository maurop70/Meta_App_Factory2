<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: system-ui, sans-serif; width: 280px; padding: 16px;
           background: #0f0f0f; color: #e0e0e0; }
    h2   { margin: 0 0 12px; font-size: 14px; color: #7dd3fc; }
    .status { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 12px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #f87171; }
    .dot.connected { background: #4ade80; }
    .stat { font-size: 11px; color: #9ca3af; margin: 4px 0; }
    .stat span { color: #f0f0f0; font-weight: 600; }
    button { width: 100%; padding: 7px; margin-top: 10px; background: #1e293b;
             border: 1px solid #334155; color: #e0e0e0; border-radius: 6px;
             cursor: pointer; font-size: 12px; }
    button:hover { background: #334155; }
    #log { margin-top: 12px; font-size: 10px; color: #6b7280; max-height: 120px;
           overflow-y: auto; font-family: monospace; background: #1a1a1a;
           padding: 8px; border-radius: 4px; }
  </style>
</head>
<body>
  <h2>🔵 Claude MCP Bridge</h2>
  <div class="status"><div class="dot" id="dot"></div><span id="status-text">Checking...</span></div>
  <div class="stat">Events: <span id="event-count">0</span></div>
  <div class="stat">Errors: <span id="error-count">0</span></div>
  <div class="stat">Tabs monitored: <span id="tab-count">0</span></div>
  <button id="clear-btn">Clear Buffer</button>
  <div id="log"></div>
  <script>
    function refresh() {
      chrome.runtime.sendMessage({ action: "getStatus" }, (res) => {
        if (!res) return;
        document.getElementById("dot").className = "dot" + (res.connected ? " connected" : "");
        document.getElementById("status-text").textContent =
          res.connected ? "Connected to MCP Bridge" : "Bridge offline";
        document.getElementById("event-count").textContent = res.eventCount;
        document.getElementById("error-count").textContent = res.errorCount;
        document.getElementById("tab-count").textContent = res.tabCount;
        const log = document.getElementById("log");
        log.innerHTML = (res.recentErrors || []).map(e =>
          `<div style="color:#f87171;margin:2px 0">${e.timestamp?.slice(11,19)} ${e.message?.slice(0,60)}</div>`
        ).join("") || '<div style="color:#4b5563">No errors yet</div>';
      });
    }
    document.getElementById("clear-btn").addEventListener("click", () => {
      chrome.runtime.sendMessage({ action: "clearBuffer" });
    });
    refresh();
    setInterval(refresh, 1500);
  </script>
</body>
</html>
