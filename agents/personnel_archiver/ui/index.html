<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnel Archiver | Antigravity AI</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    
    <main class="glass-container">
        <a href="../../App_Hub/index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Hub</a>
        <header>
            <div class="icon-wrapper"><i class="fa-solid fa-file-archive"></i></div>
            <h1>Personnel Archiver</h1>
            <p>Automated employee file relocation and systematic organization.</p>
        </header>
        
        <div class="actions">
            <button id="generate-btn">
                <span class="btn-text">Run Archiver</span>
                <span class="loader hidden"></span>
            </button>
        </div>
        
        <div id="status-message" class="hidden"></div>
        <pre id="log-output" class="hidden"></pre>
    </main>

    <script src="./app.js"></script>
</body>
</html>
