server {
    listen 80;
    server_name 68.183.30.128;

    root /opt/erp/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/v1/auth/ {
        proxy_pass http://127.0.0.1:9000/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/taxonomy/ {
        proxy_pass http://127.0.0.1:9000/api/v1/taxonomy/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
