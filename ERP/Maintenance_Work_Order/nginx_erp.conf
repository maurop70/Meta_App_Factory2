server {
    listen 80;
    # Multi-tenant routing: capture the tenant subdomain label, and also accept
    # direct droplet-IP access (the backend maps the IP / apex to the 'default'
    # tenant). NOTE: replace 'domain.com' with the real registered apex domain; a
    # wildcard DNS record (*.domain.com -> 68.183.30.128) must point at this droplet.
    server_name ~^(?<tenant>[a-zA-Z0-9\-]+)\.domain\.com$ 68.183.30.128;

    # Nginx Decoupling Doctrine: Nginx owns the static SPA; FastAPI serves only /mwo + /auth.
    root /opt/erp/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward the verbatim client Host header on every proxy so the backend can
    # resolve the tenant from the subdomain (TenantContextMiddleware parses it).
    location /mwo/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /auth/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
