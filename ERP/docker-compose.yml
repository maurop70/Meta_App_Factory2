version: '3.8'

services:
  gateway-core:
    build:
      context: ./Module_0_Gateway
    container_name: gateway-core
    ports:
      - "9000:9000"
    volumes:
      - ./Module_0_Gateway/data:/app/data
      - ./Module_0_Gateway/keys:/app/keys
    networks:
      - erp_net
    restart: unless-stopped

  mwo-backend:
    build:
      context: ./Maintenance_Work_Order
    container_name: mwo-backend
    ports:
      - "8000:8000"
    volumes:
      - ./Maintenance_Work_Order/data:/app/data
    networks:
      - erp_net
    depends_on:
      - gateway-core
    restart: unless-stopped
    environment:
      - TZ=UTC

  mwo-frontend:
    build:
      context: ./maintenance_frontend
    container_name: mwo-frontend
    ports:
      - "8080:80"
    networks:
      - erp_net
    depends_on:
      - gateway-core
      - mwo-backend
    restart: unless-stopped

networks:
  erp_net:
    driver: bridge
