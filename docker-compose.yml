version: '3.8'

services:
  meta_app_factory:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meta_app_factory_core
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    ports:
      # Core API explicit binding
      - "5000:5000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      # Full bi-directional mount to ensure factory.py scaffolding operations
      # (new folders, artifacts) write directly back to the host machine.
      - .:/app
      - ../.system_logs:/var/log/aether_net
      # Explicit Architectural_Ledger.json mount from the global root workspace
      - ../.system_core:/app/.system_core:ro
      # Anonymous volume masks to blind the Core API from child I/O thrashing
      - /app/Alpha_V2_Genesis/Alpha_Data
      - /app/Resonance/uploads
      - /app/Resonance/Professional_Reports
      - /app/Sentinel_Bridge/data
    restart: unless-stopped
    networks:
      - aether_net

networks:
  aether_net:
    name: aether_net
    driver: bridge
