<!DOCTYPE html><html><head><script src="https://unpkg.com/react@18/umd/react.development.js"></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script><script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script></head><body><div id="root"></div><script type="text/babel">const { useState } = React; function Atomizer() { const [appId, setAppId] = useState(""); const [path, setPath] = useState(""); const handleIngest = async () => { const payload = { child_app_id: appId, atom_type: "frontend_component", relative_path: path, directive: "audit", token_boundary: { start_line: 1, end_line: 100 } }; await axios.post("/api/atomizer/ingest", payload); }; return (<div id="atomizer-panel"><input id="child-app-id" value={appId} onChange={(e) => setAppId(e.target.value)} /><input id="relative-path" value={path} onChange={(e) => setPath(e.target.value)} /><button id="ingest-btn" onClick={handleIngest}>Ingest Atom</button></div>); } const root = ReactDOM.createRoot(document.getElementById("root")); root.render(<Atomizer />);</script></body></html>
